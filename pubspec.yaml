name: canvas
description: A simple, polished notes app.
publish_to: 'none'
version: 0.9.0
environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Functionality
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0
  package_info_plus: ^8.0.0
  shared_preferences: ^2.3.0

  # Firebase Packages (legacy — kept for Phase 5 import bridge; removed in Phase 6)
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2

  # Google Sign-In (mobile + web; desktop uses googleapis_auth loopback)
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  crypto: ^3.0.5

  # Local-first storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  local_sync:
    path: ../local_sync

  # UI & Style
  google_fonts: ^8.0.0
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  markdown_widget: ^2.3.2+6

  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  image_cropper: ^8.0.2
  image: ^4.5.4
  photo_view: ^0.15.0
  super_clipboard: ^0.8.24
  desktop_drop: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation & Tools
  build_runner: ^2.4.9
  drift_dev: ^2.20.0

  # App Icon & Splash Screen
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# Configuration for the App Icon
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

# Configuration for the Splash Screen
flutter_native_splash:
  color: "#1A1A1A"
  image: assets/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/

























