name: Canvas
description: A simple, polished notes app.
publish_to: 'none' 
version: 0.3.6

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Functionality
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0

  # UI & Style
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.1
  intl: ^0.19.0 # Added for date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0

  # Code Generation & Tools
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  
  # App Icon & Splash Screen
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# Configuration for the App Icon
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

# Configuration for the Splash Screen
flutter_native_splash:
  color: "#1A1A1A"
  image: assets/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
