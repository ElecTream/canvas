name: canvas
description: A simple, polished notes app.
publish_to: 'none'
version: 0.5.1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Functionality
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0
  package_info_plus: ^8.0.0

  # Firebase Packages for Syncing
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2

  # UI & Style
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  markdown_widget: ^2.3.2+6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation & Tools
  build_runner: ^2.4.9

  # App Icon & Splash Screen
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# Configuration for the App Icon
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

# Configuration for the Splash Screen
flutter_native_splash:
  color: "#1A1A1A"
  image: assets/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
